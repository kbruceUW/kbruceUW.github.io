<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Hub Tools</title>

  <style>
    :root {
      --bg-dark: #0c1b47;
      --card-bg: #ffffff;
      --text-dark: #0c1b47;
      --text-muted: #39456b;
      --accent: #0c1b47;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell,
        "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-dark);
      color: white;
      line-height: 1.6;
    }

    /* ---- Header ---- */
    header {
      padding: 40px 32px 32px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .header-brand {
      margin-bottom: 16px;
    }

    .header-brand img {
      height: 56px;
      width: auto;
    }

    header h1 {
      font-size: 3.2rem;
      margin: 0 0 16px;
      font-weight: 600;
      letter-spacing: -0.4px;
    }

    .header-help {
      margin-top: 8px;
    }

    /* ---- Button ---- */
    .button {
      display: inline-block;
      width: 180px;
      background-color: transparent;
      color: #ffffff;
      padding: 10px 0;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      white-space: nowrap;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .button:hover {
      background-color: #ffffff;
      color: var(--bg-dark);
    }

    /* ---- Main Content ---- */
    main {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px 32px 80px;
    }

    /* ---- Card Grid ---- */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    @media (max-width: 800px) {
      .card-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ---- Card ---- */
    .card {
      background-color: var(--card-bg);
      color: var(--text-dark);
      padding: 24px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--bg-dark);
    }

    .card p {
      margin: 0 0 18px;
      color: var(--text-muted);
    }

    /* ---- Tool Button ---- */
    .card .button {
      background-color: var(--accent);
      color: #ffffff;
      border: none;
      width: 160px;
    }

    .card .button:hover {
      background-color: #162d6b;
      color: #ffffff;
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 30px 20px;
      color: #a5b4fc;
      font-size: 0.9rem;
    }

    footer a {
      color: #c7d2fe;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <header>
    <div class="header-brand">
      <img
        src="https://studentservices.on.worc.ac.uk/wp-content/uploads/2025/01/uw-wh-logo.svg"
        alt="University of Worcester logo"
      />
    </div>

    <h1>Student Hub Tools</h1>

    <div class="header-help">
      <a href="mailto:k.bruce@worc.ac.uk" class="button">Have a question?</a>
    </div>
  </header>

  <main>
    <div class="card-grid">
      <div class="card">
        <div>
          <h3>Event builder</h3>
          <p>
            Ensure your event descriptions are always perfectly formatted.
            Complete the required fields and generate HTML ready to copy and
            paste into the system.
          </p>
        </div>
        <a
          href="https://kbruceuw.github.io/event.html"
          class="button"
        >
          Open tool
        </a>
      </div>
    </div>
  </main>

  
</body>
</html>
